services:
  postgres:
    image: postgres:16
    container_name: ai_requirement_workbench_postgres
    environment:
      POSTGRES_DB: ai_requirement_workbench
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
