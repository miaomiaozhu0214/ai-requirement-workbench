server:
  port: 8080
  address: ${SERVER_ADDRESS:127.0.0.1}

spring:
  application:
    name: ai-requirement-workbench
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/ai_requirement_workbench}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    default-property-inclusion: non_null

app:
  mock-user-id: 1
  ai:
    provider: ${AI_PROVIDER:openai}
